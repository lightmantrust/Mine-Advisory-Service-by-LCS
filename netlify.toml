[build]
  command       = "npm run build"
  publish       = "dist"
  functions     = "netlify/functions"

[build.environment]
  NODE_VERSION  = "20"
  VITE_API_URL  = "/.netlify/functions/analyse"

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
